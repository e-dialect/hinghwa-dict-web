name: PR Preview Cleanup from Tencent COS
on:
  pull_request:
    types: [closed]

jobs:
  cleanup-preview:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      COSCMD_CONFIG_PATH: ${{ github.workspace }}/.cos.conf
    steps:
      - name: Install coscmd
        run: |
          pip install coscmd
          coscmd -c "$COSCMD_CONFIG_PATH" config -a ${{ secrets.TENCENT_CLOUD_SECRET_ID }} -s ${{ secrets.TENCENT_CLOUD_SECRET_KEY }} -b ${{ secrets.TENCENT_CLOUD_BUCKET }} -r ${{ secrets.TENCENT_CLOUD_REGION }}

      - name: Delete PR preview directory from COS
        run: |
          # Auto-confirm deletion to avoid interactive prompt in CI
          yes | coscmd -c "$COSCMD_CONFIG_PATH" delete -r /${REPO_NAME}-pr-${{ github.event.number }}/
        # coscmd will use the configuration written by the prior `coscmd config` step
