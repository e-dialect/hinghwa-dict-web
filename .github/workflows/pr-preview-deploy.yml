name: PR Preview Deploy to Tencent COS
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-upload:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      COSCMD_CONFIG_PATH: ${{ github.workspace }}/.cos.conf
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --production=false

      - name: Lint
        run: |
          yarn run lint --max-warnings=0

      - name: Build project
        env:
          PREVIEW_BASE: "/${{ env.REPO_NAME }}-pr-${{ github.event.number }}/"
        run: yarn run build-dev

      - name: Generate SHA256 for dist
        run: |
          find dist -type f -exec sha256sum {} \; > dist/sha256sum.txt

      - name: Install cos SDK (for server-side copy)
        run: |
          pip install cos-python-sdk-v5

      - name: Install coscmd and configure
        run: |
          pip install coscmd
          coscmd -c "$COSCMD_CONFIG_PATH" config -a ${{ secrets.TENCENT_CLOUD_SECRET_ID }} -s ${{ secrets.TENCENT_CLOUD_SECRET_KEY }} -b ${{ secrets.TENCENT_CLOUD_BUCKET }} -r ${{ secrets.TENCENT_CLOUD_REGION }}

      - name: Ensure PR prefix exists on COS (server-side copy from master)
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          python3 ./scripts/cos_copy_prefix.py \
            --bucket "${{ secrets.TENCENT_CLOUD_BUCKET }}" \
            --region "${{ secrets.TENCENT_CLOUD_REGION }}" \
            --secret-id "$TENCENT_CLOUD_SECRET_ID" \
            --secret-key "$TENCENT_CLOUD_SECRET_KEY" \
            --src-prefix "${REPO_NAME}-master/" \
            --dst-prefix "${REPO_NAME}-pr-${{ github.event.number }}/" || true

      - name: Download master sha (if exists) via SDK
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
        run: |
          python3 ./scripts/cos_copy_prefix.py \
            --bucket "${{ secrets.TENCENT_CLOUD_BUCKET }}" \
            --region "${{ secrets.TENCENT_CLOUD_REGION }}" \
            --secret-id "$TENCENT_CLOUD_SECRET_ID" \
            --secret-key "$TENCENT_CLOUD_SECRET_KEY" \
            --download-key "${REPO_NAME}-master/sha256sum.txt" \
            --output-file "./master_sha256.txt" || true

      - name: Run incremental diff vs master
        run: |
          ./scripts/incremental-diff.sh ./master_sha256.txt

      - name: Upload changed files to COS via coscmd
        run: |
          set -euo pipefail
          TARGET_PREFIX="/${REPO_NAME}-pr-${{ github.event.number }}/"
          echo "Uploading changed files -> ${TARGET_PREFIX}"
          cd dist
          mapfile -t CHANGED_FILES < <(find . -type f | sort)
          if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
            echo "No changed files to upload."
            exit 0
          fi

          for f in "${CHANGED_FILES[@]}"; do
            echo "Uploading: $f"
            timeout 600 coscmd -c "$COSCMD_CONFIG_PATH" -m 8 upload "$f" "${TARGET_PREFIX}${f#./}" || true
          done
          echo "Upload phase completed."

      - name: Comment PR with preview link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            const repoName = context.repo.repo;
            const previewUrl = `https://github.test.edialect.top/${repoName}-pr-${prNumber}/`;
            const body = `预览链接：${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const existing = comments.find(c => c.body && c.body.includes(previewUrl));
            if (!existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body
              });
            }
